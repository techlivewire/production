
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <style>
    /* ===== YOUR THEME (UNCHANGED) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #020617;
      padding: 28px;
      border-radius: 10px;
      width: 360px;
    }

    .card h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: #fff;
      margin-bottom: 14px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px 16px;
      background: #22c55e;
      border: none;
      color: #000;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>

  <form class="card" action="/admin/login" method="POST">
    <h2>Admin Login</h2>

    <input
      type="text"
      name="username"
      placeholder="Admin Username"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Password"
      required
    >

    <button type="submit">Login</button>

    <div class="note">
      Restricted access · Authorized admins only
    </div>
  </form>

</body>
</html>
